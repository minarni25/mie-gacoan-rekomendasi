<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rekomendasi Menu Gacoan</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#0d0d0d;
}

</style>

</head>

<body class="text-white min-h-screen flex justify-center items-center p-4">

<div class="w-full max-w-md bg-[#121212] rounded-3xl border border-white/10 overflow-hidden shadow-2xl pb-8">

    <!-- HEADER -->

    <div class="p-4">

        <img
            src="headergacoan.png"
            class="w-full rounded-3xl">

    </div>

    <!-- JUDUL -->

    <div class="px-6">

        <h1 class="text-3xl font-extrabold">

            🎯 Preferensi Menu Anda

        </h1>

        <p class="text-gray-400 mt-2">

            Jawab beberapa pertanyaan berikut agar kami dapat memberikan rekomendasi menu terbaik.

        </p>

    </div>

    <!-- FORM -->

    <div class="px-6 mt-6 space-y-5">

        <!-- SELERA -->

        <div>

            <label class="font-semibold block mb-2">

                🍜 Apa rasa yang paling Anda sukai?

            </label>

            <select
                id="selera"
                class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3">

                <option value="1">Manis</option>
                <option value="2">Gurih</option>
                <option value="3">Asin</option>
            </select>

        </div>

        <!-- PEDAS -->

        <div>

            <label class="font-semibold block mb-2">

                🌶️ Seberapa kuat Anda makan pedas?

            </label>

            <select
                id="pedas"
                class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3">

                <option value="1">Tidak Tahan Pedas</option>
                <option value="2">Sedikit Pedas</option>
                <option value="3">Pedas</option>
                <option value="4">Sangat Pedas</option>

            </select>

        </div>

        <!-- BUDGET -->

        <div>

            <label class="font-semibold block mb-2">

                💰 Berapa budget Anda?

            </label>

            <select
                id="budget"
                class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3">

                <option value="1">&lt; Rp20.000</option>
                <option value="2">Rp20.000 - Rp35.000</option>
                <option value="3">&gt; Rp35.000</option>

            </select>

        </div>

        <!-- ALERGI -->

        <div>

            <label class="font-semibold block mb-2">

                🚫 Ada bahan yang ingin dihindari?

            </label>

            <select
                id="alergi"
                class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3">

                <option value="1">Tidak Ada</option>
                <option value="2">Udang</option>
                <option value="3">Keju</option>
                <option value="4">Kopi</option>
                <option value="5">Cokelat</option>

            </select>

        </div>

        <!-- JUMLAH ORANG -->

        <div>

            <label class="font-semibold block mb-2">

                👥 Anda datang bersama?

            </label>

            <select
                id="jumlahOrang"
                class="w-full bg-[#1e1e1e] border border-white/10 rounded-xl p-3">

                <option value="1">Sendiri</option>
                <option value="2">Berdua</option>
                <option value="3">Bertiga atau Lebih</option>

            </select>

        </div>

    </div>

    <!-- BUTTON -->

    <div class="px-6 mt-6">

        <button
            onclick="prosesRekomendasi()"
            class="w-full bg-gradient-to-r from-pink-500 to-pink-600 rounded-2xl p-4 font-bold text-lg hover:scale-[1.02] transition">

            🔍 Lihat Rekomendasi Saya

        </button>

    </div>

    <!-- HASIL -->

    <div
        id="hasilRekomendasi"
        class="hidden mx-6 mt-6 bg-white text-black rounded-3xl p-6">

    </div>

</div>

<script src="rekomendasi.js"></script>

</body>
</html>
